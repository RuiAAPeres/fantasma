name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-dogfood-scope:
    name: CLI Dogfood Scope
    runs-on: ubuntu-latest
    outputs:
      run_cli_smoke: ${{ steps.scope.outputs.run_cli_smoke }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect CLI dogfood changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          head_sha="${GITHUB_SHA}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            echo "run_cli_smoke=true" >> "$GITHUB_OUTPUT"
            echo "cli dogfood scope fallback: missing comparable base SHA"
            exit 0
          fi

          changed_files="$(git diff --name-only "${base_sha}" "${head_sha}")"
          printf 'changed files for CLI dogfood scope:\n%s\n' "${changed_files:-<none>}"

          if printf '%s\n' "$changed_files" | bash scripts/ci/should-run-cli-smoke.sh | grep -qx true; then
            echo "run_cli_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_cli_smoke=false" >> "$GITHUB_OUTPUT"
          fi

  cli-dogfood:
    name: CLI Dogfood Smoke
    runs-on: ubuntu-latest
    needs: cli-dogfood-scope
    if: needs.cli-dogfood-scope.outputs.run_cli_smoke == 'true'
    env:
      FANTASMA_ADMIN_TOKEN: ci-cli-smoke-token

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify CLI dogfood scripts
        run: bash -n scripts/cli-smoke.sh scripts/provision-project.sh scripts/ci/should-run-cli-smoke.sh scripts/tests/cli-dogfood-gate.sh

      - name: Verify CLI dogfood scope cases
        run: bash scripts/tests/cli-dogfood-gate.sh

      - name: Run CLI smoke
        run: ./scripts/cli-smoke.sh

  rust:
    name: Rust Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fantasma
          POSTGRES_USER: fantasma
          POSTGRES_PASSWORD: fantasma
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fantasma -d fantasma"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://fantasma:fantasma@127.0.0.1:5432/fantasma

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --quiet

  swift-sdk:
    name: Swift SDK Checks
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Swift SDK tests with complete concurrency checking
        run: swift test -Xswiftc -strict-concurrency=complete

  deployment:
    name: Deployment Checks
    runs-on: ubuntu-latest
    env:
      FANTASMA_ADMIN_TOKEN: ci-compose-check-token

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose -f infra/docker/compose.yaml config

      - name: Validate Docker test Compose file
        run: docker compose -f infra/docker/compose.test.yaml config

      - name: Validate benchmark Compose file
        run: docker compose -f infra/docker/compose.bench.yaml config

      - name: Validate event schema JSON files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          schema_dir = Path("schemas/events")
          for path in schema_dir.glob("*.json"):
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
          print(f"validated {len(list(schema_dir.glob('*.json')))} schema files")
          PY

      - name: Assert OpenAPI file exists
        run: test -f schemas/openapi/fantasma.yaml
