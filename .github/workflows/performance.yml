name: Performance

on:
  push:
    branches:
      - main
      - perf-proof-gh-data
  workflow_dispatch:
    inputs:
      scenario:
        description: Scenario to run
        required: true
        default: all
        type: choice
        options:
          - all
          - hot-path
          - repair-path
          - scale-path
      profile:
        description: Benchmark profile
        required: true
        default: ci
        type: choice
        options:
          - ci
          - extended

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  hot-path:
    name: Hot Path Benchmark
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'all' || github.event.inputs.scenario == 'hot-path'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate benchmark Compose file
        run: docker compose -f infra/docker/compose.bench.yaml config

      - name: Run hot-path benchmark
        run: |
          mkdir -p artifacts/performance
          cargo run -p fantasma-bench -- \
            stack \
            --scenario hot-path \
            --profile "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'ci' }}" \
            --output artifacts/performance/hot-path.json

      - name: Publish hot-path summary
        if: always()
        run: |
          if [ -f artifacts/performance/hot-path.md ]; then
            cat artifacts/performance/hot-path.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish hot-path annotations
        if: always()
        run: |
          if [ -f artifacts/performance/hot-path.json ]; then
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("artifacts/performance/hot-path.json").read_text())

          def emit(title: str, message: str) -> None:
              escaped = (
                  message.replace("%", "%25")
                  .replace("\r", "%0D")
                  .replace("\n", "%0A")
              )
              print(f"::notice title={title}::{escaped}")

          phase_summary = ", ".join(
              f"{phase['name']}={phase['events_per_second']:.2f} events/s"
              for phase in result["phases"]
          )
          readiness_summary = ", ".join(
              f"{readiness['name']}={readiness['elapsed_ms']}ms"
              for readiness in result["readiness"]
          )
          query_summary = ", ".join(
              f"{query['name']}={query['p95_ms']}ms p95"
              for query in result["queries"]
          )

          emit("hot-path throughput", phase_summary)
          emit("hot-path readiness", readiness_summary)
          emit("hot-path query p95", query_summary)
          PY
          fi

      - name: Upload hot-path artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-path-benchmark
          path: artifacts/performance/hot-path.*
          if-no-files-found: ignore

  repair-path:
