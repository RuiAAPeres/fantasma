openapi: 3.1.0
info:
  title: Fantasma API
  version: 0.1.0
  description: |
    Fantasma is a privacy-first, self-hosted mobile analytics platform.

    This contract documents the current end-to-end slice:
    raw event ingestion into Postgres plus worker-derived session metrics.
servers:
  - url: http://localhost:8081
    description: Local ingest service
  - url: http://localhost:8082
    description: Local query API service
tags:
  - name: ingest
  - name: metrics
paths:
  /v1/events:
    post:
      tags:
        - ingest
      summary: Ingest a batch of mobile events
      operationId: ingestEvents
      parameters:
        - in: header
          name: X-Fantasma-Key
          required: true
          schema:
            type: string
          description: Project-scoped ingest key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatchRequest'
      responses:
        '202':
          description: Batch accepted and persisted to the raw event store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAcceptedResponse'
        '401':
          description: Missing or invalid ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the ingest payload limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failure for one or more events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventValidationResponse'
  /v1/metrics/events/count:
    get:
      tags:
        - metrics
      summary: Count raw events in a time range
      operationId: getEventsCount
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Raw event count encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/count:
    get:
      tags:
        - metrics
      summary: Count derived sessions in a time range
      operationId: getSessionsCount
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Session count encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/count/daily:
    get:
      tags:
        - metrics
      summary: Return daily derived session counts for an inclusive UTC date range
      operationId: getSessionsCountDaily
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Daily session counts encoded in the shared metric response shape with metric name `sessions_count_daily`. The `start_date` and `end_date` bounds are both inclusive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid inclusive date range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/duration:
    get:
      tags:
        - metrics
      summary: Average derived session duration in seconds for a time range
      operationId: getSessionsDuration
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Average session duration encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/duration/total/daily:
    get:
      tags:
        - metrics
      summary: Return total derived session duration per UTC day for an inclusive UTC date range
      operationId: getSessionDurationTotalDaily
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Daily total session duration encoded in the shared metric response shape with metric name `session_duration_total_daily`. The `start_date` and `end_date` bounds are both inclusive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid inclusive date range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/active-installs:
    get:
      tags:
        - metrics
      summary: Count distinct installs with a derived session overlapping the time range
      operationId: getActiveInstalls
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Active install count encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    Authorization:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
      description: Bearer admin token, for example `Bearer fg_pat_xxx`.
    ProjectId:
      in: query
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
    StartDateTime:
      in: query
      name: start
      required: true
      schema:
        type: string
        format: date-time
    EndDateTime:
      in: query
      name: end
      required: true
      schema:
        type: string
        format: date-time
    StartDate:
      in: query
      name: start_date
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC start date for daily series queries.
    EndDate:
      in: query
      name: end_date
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC end date for daily series queries.
  schemas:
    Platform:
      type: string
      enum:
        - ios
        - android
    EventPayload:
      type: object
      additionalProperties: false
      required:
        - event
        - timestamp
        - install_id
        - platform
      properties:
        event:
          type: string
          minLength: 1
        timestamp:
          type: string
          format: date-time
        install_id:
          type: string
          minLength: 1
        user_id:
          type:
            - string
            - "null"
        session_id:
          type:
            - string
            - "null"
          minLength: 1
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          type:
            - string
            - "null"
          minLength: 1
        properties:
          type: object
          maxProperties: 32
          additionalProperties: true
    EventBatchRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/EventPayload'
    EventValidationIssue:
      type: object
      required:
        - index
        - message
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: string
    EventAcceptedResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: integer
          minimum: 0
    EventValidationResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/EventValidationIssue'
    MetricSeriesPoint:
      type: object
      required:
        - date
        - value
      properties:
        date:
          type: string
          format: date
        value:
          type: integer
          minimum: 0
    MetricResponse:
      type: object
      required:
        - metric
        - points
      properties:
        metric:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricSeriesPoint'
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
