openapi: 3.1.0
info:
  title: Fantasma API
  version: 0.1.0
  description: |
    Fantasma is a privacy-first, self-hosted mobile analytics platform.

    The current public surface covers raw event ingestion plus worker-derived
    session metrics and worker-derived event metrics.
servers:
  - url: http://localhost:8081
    description: Local ingest service
  - url: http://localhost:8082
    description: Local query API service
tags:
  - name: ingest
  - name: metrics
paths:
  /v1/events:
    post:
      tags:
        - ingest
      summary: Ingest a batch of mobile events
      operationId: ingestEvents
      parameters:
        - in: header
          name: X-Fantasma-Key
          required: true
          schema:
            type: string
          description: Project-scoped ingest key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatchRequest'
      responses:
        '202':
          description: Batch accepted and persisted to the raw event store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAcceptedResponse'
        '401':
          description: Missing or invalid ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the ingest payload limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Unprocessable request. Structural request-shape failures return
            `{ "error": "invalid_request" }`; semantic event validation
            failures return indexed `EventValidationResponse.errors`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/EventValidationResponse'
        '500':
          description: Internal server error while resolving auth or persisting accepted events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/aggregate:
    get:
      tags:
        - metrics
      summary: Return worker-derived event counts aggregated over an inclusive UTC date range
      operationId: getEventMetricsAggregate
      description: |
        Event metrics are eventually consistent because the API reads only from
        worker-built daily rollups.

        Use normal query params for equality filters:

        - built-ins: `platform`, `app_version`, `os_version`
        - explicit properties: any additional non-reserved query key matching
          `^[a-z][a-z0-9_]{0,62}$`

        `group_by` may be repeated up to twice. The total number of distinct
        referenced dimensions across filters plus `group_by` is capped at 3.
        Queries exceeding 100 final groups fail with `group_limit_exceeded`.
      x-fantasma-explicit-property-filters:
        type: object
        description: |
          Any additional non-reserved top-level query parameter whose key
          matches `^[a-z][a-z0-9_]{0,62}$` is treated as an equality filter on
          an explicit event property.
        additionalProperties:
          type: string
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/EventName'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/EventGroupBy'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
      responses:
        '200':
          description: Aggregate worker-derived event counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMetricsAggregateResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_project_id`
            - `invalid_event`
            - `invalid_date_range`
            - `invalid_query_key`
            - `duplicate_query_key`
            - `invalid_group_by`
            - `duplicate_group_by`
            - `too_many_group_by_dimensions`
            - `too_many_dimensions`
            - `conflicting_dimension_usage`
            - `group_limit_exceeded`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived event metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/daily:
    get:
      tags:
        - metrics
      summary: Return worker-derived daily event-count series for an inclusive UTC date range
      operationId: getEventMetricsDaily
      description: |
        Event metrics are eventually consistent because the API reads only from
        worker-built daily rollups.

        Use normal query params for equality filters:

        - built-ins: `platform`, `app_version`, `os_version`
        - explicit properties: any additional non-reserved query key matching
          `^[a-z][a-z0-9_]{0,62}$`

        `group_by` may be repeated up to twice. The total number of distinct
        referenced dimensions across filters plus `group_by` is capped at 3.
        Queries exceeding 100 final series fail with `group_limit_exceeded`.
      x-fantasma-explicit-property-filters:
        type: object
        description: |
          Any additional non-reserved top-level query parameter whose key
          matches `^[a-z][a-z0-9_]{0,62}$` is treated as an equality filter on
          an explicit event property.
        additionalProperties:
          type: string
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/EventName'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/EventGroupBy'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
      responses:
        '200':
          description: Daily worker-derived event-count series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMetricsDailyResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_project_id`
            - `invalid_event`
            - `invalid_date_range`
            - `invalid_query_key`
            - `duplicate_query_key`
            - `invalid_group_by`
            - `duplicate_group_by`
            - `too_many_group_by_dimensions`
            - `too_many_dimensions`
            - `conflicting_dimension_usage`
            - `group_limit_exceeded`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived daily event metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/count:
    get:
      tags:
        - metrics
      summary: Count derived sessions in a time range
      operationId: getSessionsCount
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Session count encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/count/daily:
    get:
      tags:
        - metrics
      summary: Return daily derived session counts for an inclusive UTC date range
      operationId: getSessionsCountDaily
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Daily session counts encoded in the shared metric response shape with metric name `sessions_count_daily`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid inclusive date range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/duration:
    get:
      tags:
        - metrics
      summary: Average derived session duration in seconds for a time range
      operationId: getSessionsDuration
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Average session duration encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions/duration/total/daily:
    get:
      tags:
        - metrics
      summary: Return total derived session duration per UTC day for an inclusive UTC date range
      operationId: getSessionDurationTotalDaily
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Daily total session duration encoded in the shared metric response shape with metric name `session_duration_total_daily`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid inclusive date range.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/active-installs:
    get:
      tags:
        - metrics
      summary: Count distinct installs with a derived session overlapping the time range
      operationId: getActiveInstalls
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/StartDateTime'
        - $ref: '#/components/parameters/EndDateTime'
      responses:
        '200':
          description: Active install count encoded in the shared metric response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricResponse'
        '401':
          description: Missing or invalid admin token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    Authorization:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
      description: Bearer admin token, for example `Bearer fg_pat_xxx`.
    ProjectId:
      in: query
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
    EventName:
      in: query
      name: event
      required: true
      schema:
        type: string
        minLength: 1
    EventGroupBy:
      in: query
      name: group_by
      required: false
      explode: true
      schema:
        type: array
        maxItems: 2
        items:
          type: string
      description: |
        Repeat up to twice. Built-ins use `platform`, `app_version`, or
        `os_version`. Explicit properties use canonical keys that match
        `^[a-z][a-z0-9_]{0,62}$`.
    PlatformFilter:
      in: query
      name: platform
      required: false
      schema:
        type: string
      description: |
        Built-in platform equality filter. Supported SDKs currently emit
        `ios` and `android`; other strings are treated as literal filter
        values and normally yield empty results.
    AppVersionFilter:
      in: query
      name: app_version
      required: false
      schema:
        type: string
    OsVersionFilter:
      in: query
      name: os_version
      required: false
      schema:
        type: string
    StartDateTime:
      in: query
      name: start
      required: true
      schema:
        type: string
        format: date-time
    EndDateTime:
      in: query
      name: end
      required: true
      schema:
        type: string
        format: date-time
    StartDate:
      in: query
      name: start_date
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC start date.
    EndDate:
      in: query
      name: end_date
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC end date.
  schemas:
    Platform:
      type: string
      enum:
        - ios
        - android
    EventProperties:
      type: object
      maxProperties: 3
      propertyNames:
        allOf:
          - type: string
            pattern: '^[a-z][a-z0-9_]{0,62}$'
          - not:
              enum:
                - project_id
                - event
                - timestamp
                - install_id
                - properties
                - start_date
                - end_date
                - group_by
                - platform
                - app_version
                - os_version
      additionalProperties:
        type: string
      description: Explicit string event properties. Reserved keys are rejected.
    EventPayload:
      type: object
      additionalProperties: false
      required:
        - event
        - timestamp
        - install_id
        - platform
      properties:
        event:
          type: string
          minLength: 1
        timestamp:
          type: string
          format: date-time
        install_id:
          type: string
          minLength: 1
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          type:
            - string
            - 'null'
          minLength: 1
        os_version:
          type:
            - string
            - 'null'
          minLength: 1
        properties:
          $ref: '#/components/schemas/EventProperties'
    EventBatchRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/EventPayload'
    EventValidationIssue:
      type: object
      required:
        - index
        - message
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: string
    EventAcceptedResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: integer
          minimum: 0
    EventValidationResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/EventValidationIssue'
    MetricSeriesPoint:
      type: object
      required:
        - date
        - value
      properties:
        date:
          type: string
          format: date
        value:
          type: integer
          minimum: 0
    MetricResponse:
      type: object
      required:
        - metric
        - points
      properties:
        metric:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricSeriesPoint'
    EventMetricsDimensions:
      type: object
      additionalProperties:
        type:
          - string
          - 'null'
    EventMetricsAggregateRow:
      type: object
      required:
        - dimensions
        - value
      properties:
        dimensions:
          $ref: '#/components/schemas/EventMetricsDimensions'
        value:
          type: integer
          minimum: 0
    EventMetricsAggregateResponse:
      type: object
      required:
        - metric
        - group_by
        - rows
      properties:
        metric:
          type: string
          const: event_count
        group_by:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            $ref: '#/components/schemas/EventMetricsAggregateRow'
    EventMetricsPoint:
      type: object
      required:
        - date
        - value
      properties:
        date:
          type: string
          format: date
        value:
          type: integer
          minimum: 0
    EventMetricsDailySeries:
      type: object
      required:
        - dimensions
        - points
      properties:
        dimensions:
          $ref: '#/components/schemas/EventMetricsDimensions'
        points:
          type: array
          items:
            $ref: '#/components/schemas/EventMetricsPoint'
    EventMetricsDailyResponse:
      type: object
      required:
        - metric
        - group_by
        - series
      properties:
        metric:
          type: string
          const: event_count_daily
        group_by:
          type: array
          items:
            type: string
        series:
          type: array
          items:
            $ref: '#/components/schemas/EventMetricsDailySeries'
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
