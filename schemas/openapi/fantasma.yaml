openapi: 3.1.0
info:
  title: Fantasma API
  version: 0.2.0
  description: |
    Fantasma is a privacy-first, self-hosted, install-scoped mobile analytics
    platform.

    The current public surface covers raw event ingestion, operator-managed
    project provisioning, operator usage reads, worker-derived session
    metrics, and worker-derived event metrics. Fantasma accepts only known
    built-in event fields rather than arbitrary event properties.
servers:
  - url: http://localhost:8081
    description: Local ingest service
  - url: http://localhost:8082
    description: Local API service
tags:
  - name: ingest
  - name: management
  - name: metrics
paths:
  /v1/events:
    post:
      tags:
        - ingest
      summary: Ingest a batch of mobile events
      operationId: ingestEvents
      description: Accepts only project-scoped `ingest` keys and up to 200 events per batch.
      security:
        - ProjectKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatchRequest'
      responses:
        '202':
          description: Batch accepted and persisted to the raw event store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAcceptedResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the ingest payload limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Unprocessable request. Structural request-shape failures return
            `{ "error": "invalid_request" }`; semantic event validation
            failures return indexed `EventValidationResponse.errors`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/EventValidationResponse'
        '500':
          description: Internal server error while resolving auth or persisting accepted events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects:
    get:
      tags:
        - management
      summary: List projects
      operationId: listProjects
      security:
        - OperatorBearerAuth: []
      responses:
        '200':
          description: Projects in creation order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while listing projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - management
      summary: Create a project and its initial ingest key
      operationId: createProject
      security:
        - OperatorBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created with one plaintext ingest key returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while creating the project or ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}:
    get:
      tags:
        - management
      summary: Get project metadata
      operationId: getProject
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '200':
          description: Project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - management
      summary: Rename a project
      operationId: patchProject
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Project metadata after the narrow update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while updating project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - management
      summary: Start an async full-project purge
      operationId: deleteProject
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '202':
          description: Existing or newly queued purge job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDeletionResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found and no historical successful purge exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Project is already in `range_deleting`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while starting the purge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/deletions:
    get:
      tags:
        - management
      summary: List deletion jobs for a project id
      operationId: listProjectDeletions
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '200':
          description: Deletion jobs for the live or historical project id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDeletionListResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project id has no live row and no deletion history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while listing deletion jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - management
      summary: Start an async range delete
      operationId: createProjectRangeDeletion
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRangeDeletionRequest'
      responses:
        '202':
          description: Newly queued range-delete job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDeletionResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Live project row not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Project is already `range_deleting` or `pending_deletion`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid range-delete scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while starting the range delete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/deletions/{deletion_id}:
    get:
      tags:
        - management
      summary: Get one deletion job
      operationId: getProjectDeletion
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
        - $ref: '#/components/parameters/DeletionPathId'
      responses:
        '200':
          description: One deletion job for the project id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDeletionResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deletion not found under the requested project id.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading the deletion job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/keys:
    get:
      tags:
        - management
      summary: List API keys for a project
      operationId: listProjectKeys
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '200':
          description: Project keys, including revoked keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectKeyListResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while listing project keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - management
      summary: Create an ingest or read key for a project
      operationId: createProjectKey
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectKeyRequest'
      responses:
        '201':
          description: Project key created with plaintext secret returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectKeyResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while creating the project key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/keys/{key_id}:
    delete:
      tags:
        - management
      summary: Revoke a project key
      operationId: revokeProjectKey
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
        - $ref: '#/components/parameters/KeyPathId'
      responses:
        '204':
          description: Key revoked, or already revoked, under the specified project.
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project/key resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while revoking the project key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/usage/events:
    get:
      tags:
        - management
      summary: Return operator-wide accepted event usage
      operationId: getUsageEvents
      security:
        - OperatorBearerAuth: []
      description: |
        Returns accepted-event usage for the authenticated operator across all
        projects in an inclusive UTC `YYYY-MM-DD` window.

        Usage counts raw accepted events by `received_at`, not client event
        timestamp, so billing windows track accepted traffic rather than late
        or backdated client timestamps.

        Only `start` and `end` are accepted. Duplicate query keys fail fast
        with `duplicate_query_key`; legacy public keys such as `project_id`,
        `start_date`, and `end_date` fail fast with `invalid_query_key`.
      parameters:
        - $ref: '#/components/parameters/UsageStart'
        - $ref: '#/components/parameters/UsageEnd'
      responses:
        '200':
          description: Operator-wide accepted-event usage for the requested window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageEventsResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `duplicate_query_key`
            - `invalid_query_key`
            - `invalid_time_range`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading usage data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events:
    get:
      tags:
        - metrics
      summary: Return worker-derived bucketed event metrics
      operationId: getEventMetrics
      security:
        - ProjectKeyHeader: []
      description: |
        Event metrics are eventually consistent because the API reads only from
        worker-built hourly and daily rollups.

        `metric=count` is the only public event metric, and it requires `event`.

        Use only the built-in dimensions `platform`, `app_version`,
        `os_version`, and `locale`.

        Repeated `group_by` is supported on those same built-ins. Total
        referenced dimensions across filters plus `group_by` are capped at 4.
        Duplicate group keys and filter/group overlap fail fast with `422`.

        Legacy public params such as `project_id`, `start_date`, and
        `end_date` fail fast with `422`.
      parameters:
        - $ref: '#/components/parameters/EventName'
        - $ref: '#/components/parameters/EventMetric'
        - $ref: '#/components/parameters/EventMetricGranularity'
        - $ref: '#/components/parameters/MetricStart'
        - $ref: '#/components/parameters/MetricEnd'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
        - $ref: '#/components/parameters/LocaleFilter'
        - $ref: '#/components/parameters/MetricGroupBy'
      responses:
        '200':
          description: Bucketed event metric series using the uniform metrics family response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_event`
            - `invalid_metric`
            - `invalid_granularity`
            - `invalid_time_range`
            - `invalid_query_key`
            - `duplicate_query_key`
            - `too_many_dimensions`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived event metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/catalog:
    get:
      tags:
        - metrics
      summary: List known event names in a time window
      operationId: getEventCatalog
      security:
        - ProjectKeyHeader: []
      description: |
        Returns distinct event names seen for the authenticated project in the
        requested time window, ordered by most recent occurrence.

        These reads are project-scoped from the authenticated `read` key and
        read directly from accepted raw events. They are intended for event
        discovery, not bucketed chart series.

        Use only the built-in equality filters `platform`, `app_version`,
        `os_version`, and `locale`. Legacy public params such as `project_id`,
        `start_date`, `end_date`, and `group_by` fail fast with `422`.
      parameters:
        - $ref: '#/components/parameters/EventDiscoveryStart'
        - $ref: '#/components/parameters/EventDiscoveryEnd'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
        - $ref: '#/components/parameters/LocaleFilter'
      responses:
        '200':
          description: Distinct event names ordered by most recent occurrence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCatalogResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_time_range`
            - `invalid_query_key`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading event catalog data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/top:
    get:
      tags:
        - metrics
      summary: Return ranked event counts in a time window
      operationId: getTopEvents
      security:
        - ProjectKeyHeader: []
      description: |
        Returns ranked event counts for the authenticated project in the
        requested time window, ordered by count descending and event name
        ascending as a deterministic tie-breaker.

        These reads are project-scoped from the authenticated `read` key and
        read directly from accepted raw events. They are discovery helpers, not
        worker-derived bucketed metrics.

        Use only the built-in equality filters `platform`, `app_version`,
        `os_version`, and `locale`. Legacy public params such as `project_id`,
        `start_date`, `end_date`, and `group_by` fail fast with `422`.
      parameters:
        - $ref: '#/components/parameters/EventDiscoveryStart'
        - $ref: '#/components/parameters/EventDiscoveryEnd'
        - $ref: '#/components/parameters/TopEventsLimit'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
        - $ref: '#/components/parameters/LocaleFilter'
      responses:
        '200':
          description: Ranked event counts in the requested window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopEventsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_time_range`
            - `invalid_query_key`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading top-events data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/live_installs:
    get:
      tags:
        - metrics
      summary: Return the current live install count
      operationId: getLiveInstalls
      security:
        - ProjectKeyHeader: []
      description: |
        Returns the current project-wide count of installs whose latest
        worker-processed raw event `received_at` is within the last 120
        seconds.

        This is a narrow current-state endpoint, not a bucketed metrics-family
        query. It accepts no public query parameters. Like the other metrics
        routes, it is eventually consistent because it reads from worker-owned
        derived state rather than the ingest path.
      responses:
        '200':
          description: Current live install count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveInstallsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid query. This route does not accept any public query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading live install state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions:
    get:
      tags:
        - metrics
      summary: Return worker-derived session metrics
      operationId: getSessionMetrics
      security:
        - ProjectKeyHeader: []
      description: |
        Session metrics are eventually consistent because the API reads from
        worker-maintained session-derived state.

        Supported public metrics are:

        - `count`
        - `duration_total`
        - `new_installs`
        - `active_installs`

        `count`, `duration_total`, and `new_installs` read from worker-built
        hourly and daily rollups and keep the existing `granularity` contract.

        `active_installs` stays on this route but uses exact inclusive UTC
        `start` / `end` dates instead of `granularity`. It accepts optional
        `interval=day|week|month|year`. `week|month|year` windows are
        calendar-shaped and clipped to the request edges; requests do not need
        aligned boundaries.

        Built-in filter and grouping dimensions are `platform`, `app_version`,
        `os_version`, and `locale`.

        `count`, `duration_total`, and `new_installs` allow up to 4 total
        referenced dimensions across filters plus repeated `group_by`.

        `active_installs` allows up to 2 total referenced dimensions across
        filters plus repeated `group_by`; requests above D2 fail fast with
        `422` instead of falling back to ad hoc distinct-count scans.

        Duplicate group keys and filter/group overlap fail fast with `422`.
        Legacy public params such as `project_id`, `start_date`, and
        `end_date` fail fast with `422`.

        `new_installs` keeps first-seen assignment fixed once an install is
        recorded, even if earlier late events arrive later. `active_installs`
        counts distinct installs with at least one session whose
        `session_start` falls inside the exact requested UTC range.
      parameters:
        - $ref: '#/components/parameters/SessionMetric'
        - $ref: '#/components/parameters/SessionMetricGranularity'
        - $ref: '#/components/parameters/MetricInterval'
        - $ref: '#/components/parameters/MetricStart'
        - $ref: '#/components/parameters/MetricEnd'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
        - $ref: '#/components/parameters/LocaleFilter'
        - $ref: '#/components/parameters/MetricGroupBy'
      responses:
        '200':
          description: Bucketed session metrics for `count`, `duration_total`, and `new_installs`, or exact-range point windows for `active_installs`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MetricsResponse'
                  - $ref: '#/components/schemas/ActiveInstallsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `duplicate_query_key`
            - `invalid_query_key`
            - `too_many_dimensions`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived session metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    OperatorBearerAuth:
      type: http
      scheme: bearer
      description: Operator bearer token for `/v1/projects*` management routes and `/v1/usage/*` operator reads.
    ProjectKeyHeader:
      type: apiKey
      in: header
      name: X-Fantasma-Key
      description: Project-scoped key header. Ingest routes require `ingest` keys; metrics routes require `read` keys.
  parameters:
    ProjectPathId:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
      description: Project identifier.
    DeletionPathId:
      in: path
      name: deletion_id
      required: true
      schema:
        type: string
        format: uuid
      description: Deletion-job identifier.
    KeyPathId:
      in: path
      name: key_id
      required: true
      schema:
        type: string
        format: uuid
      description: Project key identifier.
    EventName:
      in: query
      name: event
      required: false
      schema:
        type: string
        minLength: 1
      description: |
        Required when `metric=count`.
    EventMetric:
      in: query
      name: metric
      required: true
      schema:
        type: string
        enum:
          - count
    SessionMetric:
      in: query
      name: metric
      required: true
      schema:
        type: string
        enum:
          - count
          - duration_total
          - new_installs
          - active_installs
    EventMetricGranularity:
      in: query
      name: granularity
      required: true
      schema:
        type: string
        enum:
          - hour
          - day
      description: |
        Bucket granularity. Required for event metrics. `hour` uses UTC
        RFC3339 hour-start timestamps. `day` uses inclusive UTC
        `YYYY-MM-DD` bucket starts.
    SessionMetricGranularity:
      in: query
      name: granularity
      required: false
      schema:
        type: string
        enum:
          - hour
          - day
      description: |
        Bucket granularity. Required for session metrics `count`,
        `duration_total`, and `new_installs`. `hour` uses UTC RFC3339
        hour-start timestamps. `day` uses inclusive UTC `YYYY-MM-DD` bucket
        starts. `active_installs` rejects this parameter.
    MetricInterval:
      in: query
      name: interval
      required: false
      schema:
        $ref: '#/components/schemas/MetricIntervalValue'
      description: |
        Exact-range intervaling for `metric=active_installs` only. `day` uses
        UTC day windows. `week|month|year` use calendar-shaped windows clipped
        to the exact request edges.
    PlatformFilter:
      in: query
      name: platform
      required: false
      schema:
        type: string
      description: |
        Built-in platform equality filter. Supported SDKs currently emit
        `ios` and `android`; other strings are treated as literal filter
        values and normally yield empty results.
    AppVersionFilter:
      in: query
      name: app_version
      required: false
      schema:
        type: string
    OsVersionFilter:
      in: query
      name: os_version
      required: false
      schema:
        type: string
    LocaleFilter:
      in: query
      name: locale
      required: false
      schema:
        type: string
    MetricGroupBy:
      in: query
      name: group_by
      required: false
      explode: true
      schema:
        type: array
        items:
          type: string
          enum:
            - platform
            - app_version
            - os_version
            - locale
      description: |
        Repeat to group by built-in dimensions in request order. Supported
        keys are `platform`, `app_version`, `os_version`, and `locale`.
    MetricStart:
      in: query
      name: start
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC start. Use RFC3339 `...:00:00Z` hour starts when
        `granularity=hour`. Use `YYYY-MM-DD` for bucketed day reads and for
        exact-range `active_installs`.
    MetricEnd:
      in: query
      name: end
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC end. Use RFC3339 `...:00:00Z` hour starts when
        `granularity=hour`. Use `YYYY-MM-DD` for bucketed day reads and for
        exact-range `active_installs`.
    EventDiscoveryStart:
      in: query
      name: start
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC start for event discovery reads. Use `YYYY-MM-DD` for
        whole-day windows or RFC3339 timestamps for a narrower window.
    EventDiscoveryEnd:
      in: query
      name: end
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC end for event discovery reads. Use `YYYY-MM-DD` for
        whole-day windows or RFC3339 timestamps for a narrower window.
    TopEventsLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
      description: Maximum number of ranked events to return.
  schemas:
    Project:
      type: object
      required:
        - id
        - name
        - state
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        state:
          $ref: '#/components/schemas/ProjectState'
        created_at:
          type: string
          format: date-time
    ProjectState:
      type: string
      enum:
        - active
        - range_deleting
        - pending_deletion
    ProjectSummary:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        created_at:
          type: string
          format: date-time
    UsageProjectEvents:
      type: object
      required:
        - project
        - events_processed
      properties:
        project:
          $ref: '#/components/schemas/ProjectSummary'
        events_processed:
          type: integer
          minimum: 0
    UsageEventsResponse:
      type: object
      required:
        - start
        - end
        - total_events_processed
        - projects
      properties:
        start:
          type: string
          format: date
        end:
          type: string
          format: date
        total_events_processed:
          type: integer
          minimum: 0
        projects:
          type: array
          items:
            $ref: '#/components/schemas/UsageProjectEvents'
    ProjectListResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: '#/components/schemas/Project'
    ProjectDeletionKind:
      type: string
      enum:
        - project_purge
        - range_delete
    ProjectDeletionStatus:
      type: string
      enum:
        - queued
        - running
        - succeeded
        - failed
    ProjectDeletionScope:
      type:
        - object
        - 'null'
      additionalProperties: false
      properties:
        start_at:
          type: string
          format: date-time
        end_before:
          type: string
          format: date-time
        event:
          type:
            - string
            - 'null'
          minLength: 1
        filters:
          type: object
          additionalProperties:
            type: string
        properties:
          type: object
          additionalProperties:
            type: string
    ProjectDeletion:
      type: object
      required:
        - id
        - project_id
        - project_name
        - kind
        - status
        - scope
        - created_at
        - started_at
        - finished_at
        - error_code
        - error_message
        - deleted_raw_events
        - deleted_sessions
        - rebuilt_installs
        - rebuilt_days
        - rebuilt_hours
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        project_name:
          type: string
        kind:
          $ref: '#/components/schemas/ProjectDeletionKind'
        status:
          $ref: '#/components/schemas/ProjectDeletionStatus'
        scope:
          $ref: '#/components/schemas/ProjectDeletionScope'
        created_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - 'null'
          format: date-time
        finished_at:
          type:
            - string
            - 'null'
          format: date-time
        error_code:
          type:
            - string
            - 'null'
        error_message:
          type:
            - string
            - 'null'
        deleted_raw_events:
          type: integer
          minimum: 0
        deleted_sessions:
          type: integer
          minimum: 0
        rebuilt_installs:
          type: integer
          minimum: 0
        rebuilt_days:
          type: integer
          minimum: 0
        rebuilt_hours:
          type: integer
          minimum: 0
    ProjectDeletionResponse:
      type: object
      required:
        - deletion
      properties:
        deletion:
          $ref: '#/components/schemas/ProjectDeletion'
    ProjectDeletionListResponse:
      type: object
      required:
        - deletions
      properties:
        deletions:
          type: array
          items:
            $ref: '#/components/schemas/ProjectDeletion'
    ProjectKeyKind:
      type: string
      enum:
        - ingest
        - read
    ProjectKey:
      type: object
      required:
        - id
        - name
        - kind
        - prefix
        - created_at
        - revoked_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
        prefix:
          type: string
          minLength: 1
          description: Redacted key prefix only. Full secrets are returned only on create responses.
        created_at:
          type: string
          format: date-time
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
    ProjectKeyWithSecret:
      type: object
      required:
        - id
        - name
        - kind
        - prefix
        - secret
        - created_at
        - revoked_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
        prefix:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1
          description: Plaintext secret returned exactly once when the key is created.
        created_at:
          type: string
          format: date-time
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
    ProjectKeyListResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/ProjectKey'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - ingest_key_name
      properties:
        name:
          type: string
          minLength: 1
        ingest_key_name:
          type: string
          minLength: 1
    CreateProjectResponse:
      type: object
      required:
        - project
        - ingest_key
      properties:
        project:
          $ref: '#/components/schemas/Project'
        ingest_key:
          $ref: '#/components/schemas/ProjectKeyWithSecret'
    PatchProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
    CreateProjectKeyRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - kind
      properties:
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
    CreateProjectKeyResponse:
      type: object
      required:
        - key
      properties:
        key:
          $ref: '#/components/schemas/ProjectKeyWithSecret'
    CreateRangeDeletionRequest:
      type: object
      additionalProperties: false
      required:
        - start_at
        - end_before
      properties:
        start_at:
          type: string
          format: date-time
        end_before:
          type: string
          format: date-time
        event:
          type:
            - string
            - 'null'
          minLength: 1
        filters:
          type: object
          additionalProperties:
            type: string
          description: Allowed keys are `platform`, `app_version`, `os_version`, and `locale`.
    Platform:
      type: string
      enum:
        - ios
        - android
    EventPayload:
      type: object
      description: Install-scoped mobile event payload for Fantasma.
      additionalProperties: false
      required:
        - event
        - timestamp
        - install_id
        - platform
      properties:
        event:
          type: string
          minLength: 1
        timestamp:
          type: string
          format: date-time
        install_id:
          type: string
          minLength: 1
          description: Stable install-scoped client identity used by ingest and backend sessionization. It is not a person identifier and it is not a public metrics query dimension.
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          type:
            - string
            - 'null'
          minLength: 1
          description: Optional built-in app version.
        os_version:
          type:
            - string
            - 'null'
          minLength: 1
          description: Optional built-in OS version. First-party SDKs populate it when supported.
        locale:
          type:
            - string
            - 'null'
          minLength: 1
          description: Optional built-in locale. First-party SDKs populate it when supported.
    EventBatchRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/EventPayload'
    EventValidationIssue:
      type: object
      required:
        - index
        - message
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: string
    EventAcceptedResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: integer
          minimum: 0
    EventValidationResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/EventValidationIssue'
    EventCatalogItem:
      type: object
      required:
        - name
        - last_seen_at
      properties:
        name:
          type: string
          minLength: 1
        last_seen_at:
          type: string
          format: date-time
    EventCatalogResponse:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventCatalogItem'
    TopEventItem:
      type: object
      required:
        - name
        - count
      properties:
        name:
          type: string
          minLength: 1
        count:
          type: integer
          minimum: 0
    TopEventsResponse:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TopEventItem'
    MetricGranularityValue:
      type: string
      enum:
        - hour
        - day
        - week
        - month
        - year
    MetricIntervalValue:
      type: string
      enum:
        - day
        - week
        - month
        - year
    UsageStart:
      in: query
      name: start
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC start date for operator usage reads.
    UsageEnd:
      in: query
      name: end
      required: true
      schema:
        type: string
        format: date
      description: Inclusive UTC end date for operator usage reads.
    MetricsPoint:
      type: object
      required:
        - bucket
        - value
      properties:
        bucket:
          type: string
          description: UTC bucket identifier. `hour` uses RFC3339 hour starts; `day|week|month|year` use `YYYY-MM-DD` bucket starts.
        value:
          type: integer
          minimum: 0
    MetricsDimensions:
      type: object
      additionalProperties:
        type:
          - string
          - 'null'
    MetricsSeries:
      type: object
      required:
        - dimensions
        - points
      properties:
        dimensions:
          $ref: '#/components/schemas/MetricsDimensions'
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricsPoint'
    MetricsResponse:
      type: object
      required:
        - metric
        - granularity
        - group_by
        - series
      properties:
        metric:
          type: string
        granularity:
          $ref: '#/components/schemas/MetricGranularityValue'
        group_by:
          type: array
          items:
            type: string
            enum:
              - platform
              - app_version
              - os_version
              - locale
        series:
          type: array
          items:
            $ref: '#/components/schemas/MetricsSeries'
    ActiveInstallsPoint:
      type: object
      required:
        - start
        - end
        - value
      properties:
        start:
          type: string
        end:
          type: string
        value:
          type: integer
          minimum: 0
    ActiveInstallsSeries:
      type: object
      required:
        - dimensions
        - points
      properties:
        dimensions:
          $ref: '#/components/schemas/MetricsDimensions'
        points:
          type: array
          items:
            $ref: '#/components/schemas/ActiveInstallsPoint'
    ActiveInstallsResponse:
      type: object
      required:
        - metric
        - start
        - end
        - group_by
        - series
      properties:
        metric:
          type: string
          const: active_installs
        start:
          type: string
        end:
          type: string
        interval:
          $ref: '#/components/schemas/MetricIntervalValue'
        group_by:
          type: array
          items:
            type: string
            enum:
              - platform
              - app_version
              - os_version
              - locale
        series:
          type: array
          items:
            $ref: '#/components/schemas/ActiveInstallsSeries'
    LiveInstallsResponse:
      type: object
      required:
        - metric
        - window_seconds
        - as_of
        - value
      properties:
        metric:
          type: string
          const: live_installs
        window_seconds:
          type: integer
          const: 120
        as_of:
          type: string
          format: date-time
        value:
          type: integer
          minimum: 0
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
