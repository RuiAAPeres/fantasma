openapi: 3.1.0
info:
  title: Fantasma API
  version: 0.1.0
  description: |
    Fantasma is a privacy-first, self-hosted, install-scoped mobile analytics
    platform.

    The current public surface covers raw event ingestion, operator-managed
    project provisioning, worker-derived session metrics, and worker-derived
    event metrics. Event properties are explicit string-to-string context with
    at most 4 keys.
servers:
  - url: http://localhost:8081
    description: Local ingest service
  - url: http://localhost:8082
    description: Local API service
tags:
  - name: ingest
  - name: management
  - name: metrics
paths:
  /v1/events:
    post:
      tags:
        - ingest
      summary: Ingest a batch of mobile events
      operationId: ingestEvents
      description: Accepts only project-scoped `ingest` keys.
      security:
        - ProjectKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatchRequest'
      responses:
        '202':
          description: Batch accepted and persisted to the raw event store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAcceptedResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Request body exceeds the ingest payload limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Unprocessable request. Structural request-shape failures return
            `{ "error": "invalid_request" }`; semantic event validation
            failures return indexed `EventValidationResponse.errors`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/EventValidationResponse'
        '500':
          description: Internal server error while resolving auth or persisting accepted events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects:
    get:
      tags:
        - management
      summary: List projects
      operationId: listProjects
      security:
        - OperatorBearerAuth: []
      responses:
        '200':
          description: Projects in creation order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while listing projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - management
      summary: Create a project and its initial ingest key
      operationId: createProject
      security:
        - OperatorBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created with one plaintext ingest key returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while creating the project or ingest key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}:
    get:
      tags:
        - management
      summary: Get project metadata
      operationId: getProject
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '200':
          description: Project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - management
      summary: Rename a project
      operationId: patchProject
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Project metadata after the narrow update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while updating project metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/keys:
    get:
      tags:
        - management
      summary: List API keys for a project
      operationId: listProjectKeys
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      responses:
        '200':
          description: Project keys, including revoked keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectKeyListResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while listing project keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - management
      summary: Create an ingest or read key for a project
      operationId: createProjectKey
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectKeyRequest'
      responses:
        '201':
          description: Project key created with plaintext secret returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectKeyResponse'
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while creating the project key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/projects/{project_id}/keys/{key_id}:
    delete:
      tags:
        - management
      summary: Revoke a project key
      operationId: revokeProjectKey
      security:
        - OperatorBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectPathId'
        - $ref: '#/components/parameters/KeyPathId'
      responses:
        '204':
          description: Key revoked, or already revoked, under the specified project.
        '401':
          description: Missing or invalid operator bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project/key resource not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while revoking the project key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events:
    get:
      tags:
        - metrics
      summary: Return worker-derived bucketed event-count series
      operationId: getEventMetrics
      security:
        - ProjectKeyHeader: []
      description: |
        Event metrics are eventually consistent because the API reads only from
        worker-built hourly and daily rollups.

        `metric=count` is the only public event metric in v1.

        Use normal query params for equality filters:

        - built-ins: `platform`, `app_version`, `os_version`
        - explicit properties: any additional non-reserved query key matching
          `^[a-z][a-z0-9_]{0,62}$`
        - legacy public params such as `project_id`, `start_date`, and
          `end_date` fail fast and are never reinterpreted as property filters

        `group_by` may be repeated up to twice. The total number of distinct
        referenced dimensions across filters plus `group_by` is capped at 4.
        Queries exceeding 100 final groups fail with `group_limit_exceeded`.
      x-fantasma-explicit-property-filters:
        type: object
        description: |
          Any additional non-reserved top-level query parameter whose key
          matches `^[a-z][a-z0-9_]{0,62}$` is treated as an equality filter on
          an explicit event property.
        additionalProperties:
          type: string
      parameters:
        - $ref: '#/components/parameters/EventName'
        - $ref: '#/components/parameters/EventMetric'
        - $ref: '#/components/parameters/MetricGranularity'
        - $ref: '#/components/parameters/MetricStart'
        - $ref: '#/components/parameters/MetricEnd'
        - $ref: '#/components/parameters/EventGroupBy'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
      responses:
        '200':
          description: Bucketed event-count series using the uniform metrics family response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_event`
            - `invalid_metric`
            - `invalid_granularity`
            - `invalid_time_range`
            - `invalid_query_key`
            - `duplicate_query_key`
            - `invalid_group_by`
            - `duplicate_group_by`
            - `too_many_group_by_dimensions`
            - `too_many_dimensions`
            - `conflicting_dimension_usage`
            - `group_limit_exceeded`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived event metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/catalog:
    get:
      tags:
        - metrics
      summary: List known event names in a time window
      operationId: getEventCatalog
      security:
        - ProjectKeyHeader: []
      description: |
        Returns distinct event names seen for the authenticated project in the
        requested time window, ordered by most recent occurrence.

        These reads are project-scoped from the authenticated `read` key and
        read directly from accepted raw events. They are intended for event
        discovery, not bucketed chart series.

        Use normal query params for equality filters:

        - built-ins: `platform`, `app_version`, `os_version`
        - explicit properties: any additional non-reserved query key matching
          `^[a-z][a-z0-9_]{0,62}$`
        - legacy public params such as `project_id`, `start_date`, and
          `end_date` fail fast and are never reinterpreted as property filters
      x-fantasma-explicit-property-filters:
        type: object
        description: |
          Any additional non-reserved top-level query parameter whose key
          matches `^[a-z][a-z0-9_]{0,62}$` is treated as an equality filter on
          an explicit event property.
        additionalProperties:
          type: string
      parameters:
        - $ref: '#/components/parameters/EventDiscoveryStart'
        - $ref: '#/components/parameters/EventDiscoveryEnd'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
      responses:
        '200':
          description: Distinct event names ordered by most recent occurrence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCatalogResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_time_range`
            - `invalid_query_key`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading event catalog data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/events/top:
    get:
      tags:
        - metrics
      summary: Return ranked event counts in a time window
      operationId: getTopEvents
      security:
        - ProjectKeyHeader: []
      description: |
        Returns ranked event counts for the authenticated project in the
        requested time window, ordered by count descending and event name
        ascending as a deterministic tie-breaker.

        These reads are project-scoped from the authenticated `read` key and
        read directly from accepted raw events. They are discovery helpers, not
        worker-derived bucketed metrics.

        Use normal query params for equality filters:

        - built-ins: `platform`, `app_version`, `os_version`
        - explicit properties: any additional non-reserved query key matching
          `^[a-z][a-z0-9_]{0,62}$`
        - legacy public params such as `project_id`, `start_date`, and
          `end_date` fail fast and are never reinterpreted as property filters
      x-fantasma-explicit-property-filters:
        type: object
        description: |
          Any additional non-reserved top-level query parameter whose key
          matches `^[a-z][a-z0-9_]{0,62}$` is treated as an equality filter on
          an explicit event property.
        additionalProperties:
          type: string
      parameters:
        - $ref: '#/components/parameters/EventDiscoveryStart'
        - $ref: '#/components/parameters/EventDiscoveryEnd'
        - $ref: '#/components/parameters/TopEventsLimit'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
        - $ref: '#/components/parameters/OsVersionFilter'
      responses:
        '200':
          description: Ranked event counts in the requested window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopEventsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_time_range`
            - `invalid_query_key`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading top-events data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics/sessions:
    get:
      tags:
        - metrics
      summary: Return worker-derived bucketed session metrics
      operationId: getSessionMetrics
      security:
        - ProjectKeyHeader: []
      description: |
        Session metrics are eventually consistent because the API reads only
        from worker-built hourly and daily rollups.

        Supported public metrics are:

        - `count`
        - `duration_total`
        - `new_installs`

        `group_by` may be repeated up to twice and supports only `platform`
        and `app_version`. Equality filters are limited to the same
        dimensions. Legacy public params such as `project_id`, `start_date`,
        and `end_date` fail fast with `422`.
      parameters:
        - $ref: '#/components/parameters/SessionMetric'
        - $ref: '#/components/parameters/MetricGranularity'
        - $ref: '#/components/parameters/MetricStart'
        - $ref: '#/components/parameters/MetricEnd'
        - $ref: '#/components/parameters/SessionGroupBy'
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/AppVersionFilter'
      responses:
        '200':
          description: Bucketed session metric series using the uniform metrics family response shape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Missing, invalid, revoked, or wrong-kind project read key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Invalid query. Error envelope is `{ "error": "..." }` with one of:

            - `invalid_request`
            - `group_limit_exceeded`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error while loading worker-derived session metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    OperatorBearerAuth:
      type: http
      scheme: bearer
      description: Operator bearer token for `/v1/projects*` management routes.
    ProjectKeyHeader:
      type: apiKey
      in: header
      name: X-Fantasma-Key
      description: Project-scoped key header. Ingest routes require `ingest` keys; metrics routes require `read` keys.
  parameters:
    ProjectPathId:
      in: path
      name: project_id
      required: true
      schema:
        type: string
        format: uuid
    KeyPathId:
      in: path
      name: key_id
      required: true
      schema:
        type: string
        format: uuid
    EventName:
      in: query
      name: event
      required: true
      schema:
        type: string
        minLength: 1
    EventGroupBy:
      in: query
      name: group_by
      required: false
      explode: true
      schema:
        type: array
        maxItems: 2
        items:
          type: string
      description: |
        Repeat up to twice. Built-ins use `platform`, `app_version`, or
        `os_version`. Explicit properties use canonical keys that match
        `^[a-z][a-z0-9_]{0,62}$`.
    SessionGroupBy:
      in: query
      name: group_by
      required: false
      explode: true
      schema:
        type: array
        maxItems: 2
        items:
          type: string
          enum:
            - platform
            - app_version
      description: Repeat up to twice. Only `platform` and `app_version` are supported for session metrics.
    EventMetric:
      in: query
      name: metric
      required: true
      schema:
        type: string
        enum:
          - count
    SessionMetric:
      in: query
      name: metric
      required: true
      schema:
        type: string
        enum:
          - count
          - duration_total
          - new_installs
    MetricGranularity:
      in: query
      name: granularity
      required: true
      schema:
        type: string
        enum:
          - hour
          - day
      description: |
        Bucket granularity. `hour` uses UTC RFC3339 hour-start timestamps for
        `start` and `end`; `day` uses inclusive UTC `YYYY-MM-DD` bucket dates.
    PlatformFilter:
      in: query
      name: platform
      required: false
      schema:
        type: string
      description: |
        Built-in platform equality filter. Supported SDKs currently emit
        `ios` and `android`; other strings are treated as literal filter
        values and normally yield empty results.
    AppVersionFilter:
      in: query
      name: app_version
      required: false
      schema:
        type: string
    OsVersionFilter:
      in: query
      name: os_version
      required: false
      schema:
        type: string
    MetricStart:
      in: query
      name: start
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC bucket start. Use `YYYY-MM-DD` when `granularity=day`
        and RFC3339 `...:00:00Z` hour starts when `granularity=hour`.
    MetricEnd:
      in: query
      name: end
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC bucket end. Use `YYYY-MM-DD` when `granularity=day`
        and RFC3339 `...:00:00Z` hour starts when `granularity=hour`.
    EventDiscoveryStart:
      in: query
      name: start
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC start for event discovery reads. Use `YYYY-MM-DD` for
        whole-day windows or RFC3339 timestamps for a narrower window.
    EventDiscoveryEnd:
      in: query
      name: end
      required: true
      schema:
        type: string
      description: |
        Inclusive UTC end for event discovery reads. Use `YYYY-MM-DD` for
        whole-day windows or RFC3339 timestamps for a narrower window.
    TopEventsLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
      description: Maximum number of ranked events to return.
  schemas:
    Project:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        created_at:
          type: string
          format: date-time
    ProjectListResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: '#/components/schemas/Project'
    ProjectKeyKind:
      type: string
      enum:
        - ingest
        - read
    ProjectKey:
      type: object
      required:
        - id
        - name
        - kind
        - prefix
        - created_at
        - revoked_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
        prefix:
          type: string
          minLength: 1
          description: Redacted key prefix only. Full secrets are returned only on create responses.
        created_at:
          type: string
          format: date-time
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
    ProjectKeyWithSecret:
      type: object
      required:
        - id
        - name
        - kind
        - prefix
        - secret
        - created_at
        - revoked_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
        prefix:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1
          description: Plaintext secret returned exactly once when the key is created.
        created_at:
          type: string
          format: date-time
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
    ProjectKeyListResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/ProjectKey'
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - ingest_key_name
      properties:
        name:
          type: string
          minLength: 1
        ingest_key_name:
          type: string
          minLength: 1
    CreateProjectResponse:
      type: object
      required:
        - project
        - ingest_key
      properties:
        project:
          $ref: '#/components/schemas/Project'
        ingest_key:
          $ref: '#/components/schemas/ProjectKeyWithSecret'
    PatchProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
    CreateProjectKeyRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - kind
      properties:
        name:
          type: string
          minLength: 1
        kind:
          $ref: '#/components/schemas/ProjectKeyKind'
    CreateProjectKeyResponse:
      type: object
      required:
        - key
      properties:
        key:
          $ref: '#/components/schemas/ProjectKeyWithSecret'
    Platform:
      type: string
      enum:
        - ios
        - android
    EventProperties:
      type: object
      maxProperties: 4
      propertyNames:
        allOf:
          - type: string
            pattern: '^[a-z][a-z0-9_]{0,62}$'
          - not:
              enum:
                - project_id
                - event
                - timestamp
                - install_id
                - properties
                - metric
                - granularity
                - start
                - end
                - start_date
                - end_date
                - group_by
                - platform
                - app_version
                - os_version
      additionalProperties:
        type: string
      description: Explicit string event context, capped at 4 keys. Reserved keys are rejected, and properties must not be used to reconstruct person-level identity.
    EventPayload:
      type: object
      description: Install-scoped mobile event payload for Fantasma.
      additionalProperties: false
      required:
        - event
        - timestamp
        - install_id
        - platform
      properties:
        event:
          type: string
          minLength: 1
        timestamp:
          type: string
          format: date-time
        install_id:
          type: string
          minLength: 1
          description: Stable install-scoped client identity used by ingest and backend sessionization. It is not a person identifier and it is not a public metrics query dimension.
        platform:
          $ref: '#/components/schemas/Platform'
        app_version:
          type:
            - string
            - 'null'
          minLength: 1
          description: Optional built-in app version.
        os_version:
          type:
            - string
            - 'null'
          minLength: 1
          description: Optional built-in OS version. First-party SDKs populate it when supported.
        properties:
          $ref: '#/components/schemas/EventProperties'
    EventBatchRequest:
      type: object
      additionalProperties: false
      required:
        - events
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/EventPayload'
    EventValidationIssue:
      type: object
      required:
        - index
        - message
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: string
    EventAcceptedResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: integer
          minimum: 0
    EventValidationResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/EventValidationIssue'
    EventCatalogItem:
      type: object
      required:
        - name
        - last_seen_at
      properties:
        name:
          type: string
          minLength: 1
        last_seen_at:
          type: string
          format: date-time
    EventCatalogResponse:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/EventCatalogItem'
    TopEventItem:
      type: object
      required:
        - name
        - count
      properties:
        name:
          type: string
          minLength: 1
        count:
          type: integer
          minimum: 0
    TopEventsResponse:
      type: object
      required:
        - events
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/TopEventItem'
    MetricGranularityValue:
      type: string
      enum:
        - hour
        - day
    MetricsPoint:
      type: object
      required:
        - bucket
        - value
      properties:
        bucket:
          type: string
          description: UTC bucket identifier. Days use `YYYY-MM-DD`; hours use RFC3339 hour starts.
        value:
          type: integer
          minimum: 0
    MetricsDimensions:
      type: object
      additionalProperties:
        type:
          - string
          - 'null'
    MetricsSeries:
      type: object
      required:
        - dimensions
        - points
      properties:
        dimensions:
          $ref: '#/components/schemas/MetricsDimensions'
        points:
          type: array
          items:
            $ref: '#/components/schemas/MetricsPoint'
    MetricsResponse:
      type: object
      required:
        - metric
        - granularity
        - group_by
        - series
      properties:
        metric:
          type: string
        granularity:
          $ref: '#/components/schemas/MetricGranularityValue'
        group_by:
          type: array
          items:
            type: string
        series:
          type: array
          items:
            $ref: '#/components/schemas/MetricsSeries'
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
