name: fantasma-bench

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fantasma
      POSTGRES_USER: fantasma
      POSTGRES_PASSWORD: fantasma
    ports:
      - "127.0.0.1::5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  fantasma-ingest:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingest
    depends_on:
      - postgres
    environment:
      FANTASMA_BIND_ADDRESS: 0.0.0.0:8081
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
    ports:
      - "18081:8081"

  fantasma-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      - postgres
    environment:
      FANTASMA_BIND_ADDRESS: 0.0.0.0:8082
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
      FANTASMA_ADMIN_TOKEN: ${FANTASMA_ADMIN_TOKEN:?FANTASMA_ADMIN_TOKEN must be set}
    ports:
      - "18082:8082"

  fantasma-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      - postgres
    environment:
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
      FANTASMA_WORKER_IDLE_POLL_INTERVAL_MS: 250
      FANTASMA_WORKER_SESSION_BATCH_SIZE: 2000
      FANTASMA_WORKER_EVENT_BATCH_SIZE: 5000
      FANTASMA_WORKER_SESSION_INCREMENTAL_CONCURRENCY: 8
      FANTASMA_WORKER_SESSION_REPAIR_CONCURRENCY: 2

volumes:
  postgres-data:
