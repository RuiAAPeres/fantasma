name: fantasma-bench

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fantasma
      POSTGRES_USER: fantasma
      POSTGRES_PASSWORD: fantasma
    volumes:
      - postgres-data:/var/lib/postgresql/data

  fantasma-ingest:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingest
    depends_on:
      - postgres
    environment:
      FANTASMA_BIND_ADDRESS: 0.0.0.0:8081
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
    ports:
      - "18081:8081"

  fantasma-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      - postgres
    environment:
      FANTASMA_BIND_ADDRESS: 0.0.0.0:8082
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
      FANTASMA_ADMIN_TOKEN: ${FANTASMA_ADMIN_TOKEN:-fg_pat_dev}
    ports:
      - "18082:8082"

  fantasma-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      - postgres
    environment:
      FANTASMA_DATABASE_URL: postgres://fantasma:fantasma@postgres:5432/fantasma
      FANTASMA_WORKER_BATCH_SIZE: 1000
      FANTASMA_WORKER_POLL_INTERVAL_MS: 50

volumes:
  postgres-data:
