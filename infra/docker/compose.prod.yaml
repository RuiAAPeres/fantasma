services:
  fantasma-ingest:
    networks:
      default: {}
      proxy:
        aliases:
          - ${FANTASMA_INGEST_PROXY_NETWORK_ALIAS:-fantasma-ingest}

  fantasma-api:
    networks:
      default: {}
      proxy:
        aliases:
          - ${FANTASMA_PROXY_NETWORK_ALIAS:-fantasma-api}

networks:
  proxy:
    external: true
    name: ${FANTASMA_PROXY_NETWORK_NAME:-proxy}
